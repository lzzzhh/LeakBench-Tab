protocol:
  version: independent_replication_v1
  study_kind: independent_generator_replication
  study_namespace: independent_replication_v1
  dataset_namespace: independent_replication_v1
  dataset_indices: [1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009, 1010, 1011, 1012, 1013, 1014, 1015, 1016, 1017, 1018, 1019, 1020, 1021, 1022, 1023, 1024]
  dataset_count: 25
  archetypes: [linear, interaction, nonlinear, sparse, drifting]
  tasks_per_archetype: 5
  archetype_weighting: equal
  mechanisms: [M01, M02, M06, M10, M04, M05, M08, M09]
  simple_mechanisms: [M01, M02, M06, M10]
  structured_mechanisms: [M04, M05, M08, M09]
  strengths: [S1, S2, S3, S4, S5]
  strength_values: {S1: 0.2, S2: 0.4, S3: 0.6, S4: 0.8, S5: 1.0}
  core_models: [lr, rf, catboost, lightgbm, tabm]
  seeds: [13, 2026, 7777]
  split: chronological_60_20_20
  injector: src.leakbench.mechanisms.structured_prior_v1.StructuredPriorV1Injector
  injector_amendment: structured_constant_prior_v1
  structured_prior: {type: outcome_independent_constant, value: 0.5}
  strict_policy: "task.X[:, ~task.leakage_mask]"
  full_policy: task.X
  paired_harm: full_auc_minus_strict_auc
  predictions_retained_for: [M08, M09]
  expected_task_variants: 3000
  expected_cpu_model_cells: 12000
  expected_tabm_model_cells: 3000
  expected_model_cells: 15000
  frozen_task_plan: protocols/structured_prior_v1/independent_replication_v1_tasks.csv
  frozen_inference_protocol: protocols/structured_prior_v1/inference_protocol_v1.json
  bundle_output: results/independent_replication_v1/task_bundles
  result_output: results/independent_replication_v1/model_cells.csv
  execution_gate: explicit_allow_run

statistics:
  primary_effect: simple_family_mean_harm_minus_structured_family_mean_harm
  aggregation_order: mean_cells_within_family_within_task_then_contrast_then_equal_weight_tasks
  independent_unit: generator_task
  generator_population: equal_weight_five_archetypes
  bootstrap: stratified_within_archetype
  bootstrap_repetitions: 20000
  bootstrap_seed: 20260713
  confidence_interval: percentile_95_two_sided
  sign_test: exact_two_sided_binomial_over_25_task_effects
  null_positive_probability: 0.5
  multiplicity: 1
  support_rule: lower_ci_gt_0_and_sign_test_p_le_0.05
  exclusions: none
  missingness: any_missing_or_failed_cell_makes_primary_inference_incomplete
  substitution: forbidden
  exact_zero_task_effect: invalidates_primary_inference

mechanism_parameters:
  M01: {noise_std: 0.0}
  M02: {noise_std: 0.35}
  M04: {noise_std: 0.08}
  M05: {noise_std: 0.08, time_offsets: [0.02, 0.02, 0.02, 0.02, 0.02]}
  M06: {noise_std: 0.20, redundancies: [1, 2, 4, 6, 8]}
  M08: {noise_std: 0.04, prior_strength: 5.0}
  M09: {n_sources: 8, min_group_count: 2}
  M10: {noise_std: 0.30}

tabm:
  required_version: 0.0.3
  device: cuda
  k: 32
  learning_rate: 0.003
  weight_decay: 0.0001
  max_epochs: 200
  batch_size: 256
  inference_batch_size: 1024
  patience: 20
  min_delta: 0.00001
